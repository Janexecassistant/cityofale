<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="screen-orientation" content="portrait" />
    <title>Split the G</title>
    <link rel="stylesheet" href="styles.css?v=31" />
  </head>
  <body>
    <main class="mobile-game" aria-label="Split the G tilt game">
      <div id="practiceGlass" class="pint-glass" aria-hidden="true">
        <div class="pint-liquid-mask">
          <div id="practiceBeer" class="pint-beer"></div>
          <div class="pint-head"></div>
        </div>
        <div class="target-g" aria-hidden="true">G</div>
        <div id="practiceTarget" class="target-zone" aria-hidden="true"><span></span></div>
      </div>

      <header class="game-header">
        <p class="game-name">Split the G</p>
        <div class="header-actions">
          <a class="exit-link" href="../" target="_top">Exit</a>
          <button id="soundToggle" class="icon-button" type="button" aria-pressed="true" aria-label="Toggle sound">Sound on</button>
        </div>
      </header>

      <section class="game-footer" aria-live="polite">
        <section class="game-status">
          <div><span>Round</span><strong id="roundValue">1</strong></div>
          <div><span>Best</span><strong id="bestScore">--</strong></div>
          <div><span>Score</span><strong id="scoreValue">--</strong></div>
        </section>
        <p id="feedback" class="feedback">Tap start, hold your phone straight, then tilt to pour. Straighten it to stop.</p>
        <div class="game-actions">
          <button id="tiltMode" class="primary" type="button" aria-pressed="false">Start tilt</button>
          <button id="practiceReset" type="button">Reset</button>
        </div>
      </section>
      <button id="practiceDrink" class="touch-pour" type="button">Hold to pour</button>
    </main>

    <section class="desktop-message" aria-label="Mobile game notice">
      <div>
        <p class="eyebrow">Split the G</p>
        <h1>Built for your phone.</h1>
        <p>Open this game on a mobile phone to tilt the pint and stop the stout on the line.</p>
      </div>
    </section>

    <script src="script.js?v=31"></script>
  </body>
</html>
